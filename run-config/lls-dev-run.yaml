## LLAMA-STACK Distribution Descriptor
version: '2'
image_name: lls-dev-stack

# Enabled APIs
apis:
- agents
- inference
- datasetio
- safety
- files
- tool_runtime
- vector_io
- telemetry

# Provider Configuration
providers:

  # Inference Providers
  inference:
    - provider_id: ollama
      provider_type: remote::ollama
      config:
        url: ${env.INFERENCE_URL:=http://localhost:11434}
        refresh_models: False
    - provider_id: sentence-transformers
      provider_type: inline::sentence-transformers
      config: {}

  # Vector IO Providers
  vector_io:
    - provider_id: inline-milvus
      provider_type: inline::milvus
      config:
        db_path: ${env.MILVUS_DB_PATH:=~/.llama/distributions/lls-dev-stack}/milvus.db
        persistence:
          namespace: vector_io::milvus
          backend: kv_default
    - provider_id: inline-faiss
      provider_type: inline::faiss
      config:
        persistence:
          namespace: vector_io::faiss
          backend: kv_default

  # Safety Providers
  safety:
    - provider_id: llama-guard
      provider_type: inline::llama-guard
      config:
        excluded_categories: []
    - provider_id: code-scanner
      provider_type: inline::code-scanner
#    - provider_id: prompt-guard
#      provider_type: inline::prompt-guard
#      config:
#        guard_type: injection
#
  # Files Backend
  files:
    - provider_type: inline::localfs
      provider_id: llama-localfs
      config:
        storage_dir: ${env.LOCAL_STORAGE_DIR:=~/.llama/distributions/lls-dev-stack}/localfs
        metadata_store:
          backend: sql_default
          table_name: files_metadata

  # Agentic Backend Provider
  agents:
    - provider_id: meta-reference
      provider_type: inline::meta-reference
      config:
        persistence:
          agent_state:
            backend: kv_default
            namespace: agents
          responses:
            backend: sql_default
            table_name: responses
            max_write_queue_size: 10000
            num_writers: 4

  # Dataset IO Providers
  datasetio:
    - provider_id: huggingface
      provider_type: remote::huggingface
      config:
        kvstore:
          namespace: datasetio::huggingface
          backend: kv_default
    - provider_id: localfs
      provider_type: inline::localfs
      config:
        kvstore:
          backend: kv_default
          namespace: datasetio::localfs

  tool_runtime:
    - provider_id: rag-runtime
      provider_type: inline::rag-runtime
      config: {}
    - provider_id: web-search
      provider_type: remote::bing-search
      config: {}
    - provider_id: model-context-protocol
      provider_type: remote::model-context-protocol
      config: {}

# storage providers
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORAGE_DIR:=~/.llama/distributions/lls-dev-stack/storage}/kv_default.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORAGE_DIR:=~/.llama/distributions/lls-dev-stack/storage}/sql_default.db
  stores:
    metadata:
      backend: kv_default
      namespace: registry
    inference:
      backend: sql_default
      table_name: inference_store
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: llm_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default


# stack resources
registered_resources:
  # available models
  models: []

  shields:
    - shield_id: LlamaGuard-3
      provider_id: llama-guard
      provider_shield_id: ${env.SAFETY_MODEL_OLLAMA:=llama-guard3:1b}
    - shield_id: CodeScanner
      provider_id: code-scanner
      provider_shield_id: code-scanner

  vector_dbs: []
  datasets: []

  # TOOLS
  tool_groups:
    - toolgroup_id: builtin::rag
      provider_id: rag-runtime
    - toolgroup_id: builtin::websearch
      provider_id: web-search
    - toolgroup_id: mcp::tools
      provider_id: model-context-protocol
      mcp_endpoint:
        uri: "http://localhost:8000/sse"

# defaults
vector_stores:
  default_provider_id: inline-faiss
  default_embedding_model:
    provider_id: ollama
    model_id: nomic-embed-text:latest

safety:
  default_shield_id: llama-guard

telemetry:
  enabled: True

# ENDPOINT SETTINGS
server:
  port: 8321
